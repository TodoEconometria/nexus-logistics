# application.properties

# ===== Base de datos =====
spring.datasource.url=jdbc:postgresql://localhost:5432/nexusdb
spring.datasource.username=nexus
spring.datasource.password=nexus_password_2026
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA/Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Datos iniciales =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===== OpenAPI/Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== JWT =====
jwt.secret=${JWT_SECRET:nexus-dev-secret-key-cambiar-en-produccion-32ch}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== Servidor =====
server.port=8080
